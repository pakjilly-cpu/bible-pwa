<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#00007f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="은혜와진리교회">
  <meta name="description" content="성경 66권 한영대조 + 찬송가 645곡 악보 - 은혜와진리교회">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <title>은혜와진리교회</title>
  <style>
    :root {
      --bg: #f8f5ef;
      --card: #ffffff;
      --text: #1a1a1a;
      --sub: #888888;
      --accent: #2d5a27;
      --accent-bg: rgba(45,90,39,0.08);
      --border: #e8e5de;
      --header: #ffffff;
      --nav: #ffffff;
      --shadow: rgba(0,0,0,0.04);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #00007f;
      overflow-x: hidden;
      color: var(--text);
    }
    body.loaded {
      background: var(--bg);
    }
    #root { min-height: 100vh; min-height: 100dvh; }
    @supports (padding: env(safe-area-inset-bottom)) {
      body { padding-bottom: env(safe-area-inset-bottom); }
    }
    #splash {
      position: fixed; inset: 0; background: #00007f;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 9999; transition: opacity 0.5s;
    }
    #splash.hide { opacity: 0; pointer-events: none; }
    #splash .icon { width: 80px; height: 80px; margin-bottom: 20px; border-radius: 18px; }
    #splash h1 { font-size: 22px; font-weight: 700; color: #ffffff; letter-spacing: -0.5px; }
    #splash p { font-size: 13px; color: rgba(255,255,255,0.6); margin-top: 8px; }
    #splash .loading {
      margin-top: 28px; width: 32px; height: 32px;
      border: 2.5px solid rgba(255,255,255,0.15); border-top-color: rgba(255,255,255,0.7);
      border-radius: 50%; animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    input:focus { outline: none; border-color: var(--accent) !important; }
    button { font-family: inherit; }
    *, html, body, div, section, main, article, aside, nav, ul, ol { scrollbar-width: none !important; -ms-overflow-style: none !important; overflow: -moz-scrollbars-none; }
    *::-webkit-scrollbar { display: none !important; width: 0 !important; height: 0 !important; background: transparent !important; }
    *::-webkit-scrollbar-thumb { background: transparent !important; }
    *::-webkit-scrollbar-track { background: transparent !important; }
  </style>
</head>
<body>
  <div id="splash">
    <img class="icon" src="/icon-192.png" alt="성경" />
    <h1>은혜와진리교회</h1>
    <p>성경 66권 · 찬송가 · 찬양 · 가정예배</p>
    <div class="loading"></div>
  </div>

  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel" src="/app.jsx" data-type="module"></script>

  <script type="text/babel">
    const checkAndRender = () => {
      if (window.BibleApp) {
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(window.BibleApp));
        setTimeout(() => { document.getElementById('splash')?.classList.add('hide'); document.body.classList.add('loaded'); }, 500);
        setTimeout(() => document.getElementById('splash')?.remove(), 1000);
      } else {
        setTimeout(checkAndRender, 100);
      }
    };
    window.addEventListener('load', () => setTimeout(checkAndRender, 200));
    checkAndRender();
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
